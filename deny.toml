# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[licenses]
# Licenses that are allowed for all dependencies.
# dreamd is Apache-2.0; these permissive licenses are compatible.
# (No `unmatched` key: current cargo-deny rejects it as unknown, and
# deny-by-default for any license outside `allow` is exactly the intent.)
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    # Transitive dependencies from the chrono/icu dependency chains.
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]

# Per-crate license exceptions (reviewed; deliberately NOT in the global allow
# list so each stays auditable). option-ext (transitive via dirs → dirs-sys,
# used for ~/.agent path resolution) is MPL-2.0 — OSI-approved weak, file-level
# copyleft. As an unmodified linked dependency it imposes no copyleft on
# dreamd's Apache-2.0 code; MPL obligations are per-file and trigger only on
# modifying the MPL-licensed source itself, which we do not.
exceptions = [
    { name = "option-ext", allow = ["MPL-2.0"] },
]

# Reject any dependency whose license is not in the allow list above.
# (cargo-deny now denies unlicensed and copyleft dependencies by default)

[bans]
# Deny multiple versions of the same crate to avoid dependency bloat.
multiple-versions = "warn"
# Deny wildcard dependencies. (Internal path deps each carry an explicit
# `version` — required for crates.io publish — so they are not wildcards.)
wildcards = "deny"

[advisories]
# Deny crates with known security vulnerabilities (workspace + transitive).
# (cargo-deny now denies vulnerabilities by default)
unmaintained = "workspace"
yanked = "deny"

# No per-advisory `ignore` entries as of 2026-06-23. When adding one, document:
#   - RUSTSEC ID and crate version
#   - Why the risk is accepted (no fix path, false positive, dev-only, etc.)
#   - Review date and planned removal
# Example:
# ignore = [
#   { id = "RUSTSEC-XXXX-NNNN", reason = "transitive via foo; fixed in bar 2.0 (blocked on MSRV)" },
# ]

[sources]
# Only allow crates from crates.io and your own git repositories.
unknown-registry = "deny"
unknown-git = "deny"
