# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[licenses]
# Licenses that are allowed for all dependencies.
# dreamd is Apache-2.0; these permissive licenses are compatible.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]
# Reject any dependency whose license is not in the allow list above.
# (cargo-deny now denies unlicensed and copyleft dependencies by default)

[bans]
# Deny multiple versions of the same crate to avoid dependency bloat.
multiple-versions = "warn"
# Deny wildcard dependencies.
wildcards = "deny"

[advisories]
# Deny crates with known security vulnerabilities (workspace + transitive).
# (cargo-deny now denies vulnerabilities by default)
unmaintained = "workspace"
yanked = "deny"

[sources]
# Only allow crates from crates.io and your own git repositories.
unknown-registry = "deny"
unknown-git = "deny"
