name: MCP manifest

# Pre-release helper: build shim-target tarballs and regenerate
# packages/dreamd-mcp/manifest.json. Run before npm publish when the
# manifest still has PENDING_* placeholders.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver for manifest.json (no leading v)"
        required: true
        default: "0.1.0-rc.2"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: dreamd
            asset_name: linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: dreamd
            asset_name: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: dreamd
            asset_name: darwin-aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-mcp-manifest-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-mcp-manifest-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip and package
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ matrix.artifact_name }}
          strip "$BINARY"
          tar -czf "${{ matrix.asset_name }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" \
            "${{ matrix.artifact_name }}"

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}.tar.gz
          path: ${{ matrix.asset_name }}.tar.gz
          if-no-files-found: error

  manifest:
    name: Generate manifest.json
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Regenerate manifest.json
        run: |
          chmod +x scripts/update-mcp-manifest.sh
          scripts/update-mcp-manifest.sh "${{ inputs.version }}" dist
          cat packages/dreamd-mcp/manifest.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-manifest
          path: packages/dreamd-mcp/manifest.json
          if-no-files-found: error
