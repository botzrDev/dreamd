name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Security audit (RustSec advisory database) ────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: cargo audit

  # ── License / dependency policy ──────────────────────────────────────────────
  deny:
    name: License & dependency policy (cargo-deny)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          # Pin the version: an unpinned tool silently floats its config schema
          # (a newer release rejected the old `unmatched` key with zero code
          # change). 0.19.x bundles rustsec >= 0.31, which is required to parse
          # CVSS-4.0 advisories (older cargo-deny errors on RUSTSEC-2026-0023).
          # Bump deliberately, not implicitly.
          tool: cargo-deny@0.19.8

      - name: Check licenses and advisories
        run: cargo deny check

  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # Windows daemon support (DR-121) is deferred to v0.1.1: the server/mcp
    # modules are unix-only (UDS / SO_PEERCRED), so dreamd-core does not yet
    # compile on Windows. Keep Windows in the matrix for visibility but make it
    # non-gating until DR-121 lands — mirroring the informational Windows
    # binary-size job. Linux + macOS remain hard gates.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --all-features --workspace

  # ── Binary size gate (NFR-2: stripped release < 15 MB) ───────────────────────
  size-gate:
    name: Binary size gate
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Strip and measure binary size
        run: |
          BINARY=target/release/dreamd
          strip "$BINARY"
          SIZE_BYTES=$(stat -c%s "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "Stripped binary size: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          WARN_BYTES=$((12 * 1024 * 1024))
          if [ "$SIZE_BYTES" -gt "$WARN_BYTES" ]; then
            echo "::warning::Binary size ${SIZE_MB} MB has crossed the 12 MB soft warning threshold (hard limit: 15 MB, NFR-2)"
          fi
          # NFR-2: must be < 15 MB
          MAX_BYTES=$((15 * 1024 * 1024))
          if [ "$SIZE_BYTES" -gt "$MAX_BYTES" ]; then
            echo "::error::Binary size ${SIZE_MB} MB exceeds the 15 MB limit (NFR-2)"
            exit 1
          fi
          echo "### Binary size gate" >> "$GITHUB_STEP_SUMMARY"
          echo "Stripped size: **${SIZE_MB} MB** (limit: 15 MB)" >> "$GITHUB_STEP_SUMMARY"

  # ── Idle RSS gate (NFR-1: daemon < 30 MB at idle) ─────────────────────────────
  idle-rss-gate:
    name: Idle-RSS gate (< 30 MB, Linux)
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-idle-rss-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-idle-rss-

      - name: Build release binary
        run: cargo build --release -p dreamd

      - name: Run idle-RSS measurement
        id: rss
        run: |
          MB=$(scripts/idle-rss.sh)
          echo "rss_mb=$MB" >> "$GITHUB_OUTPUT"

      - name: Write step summary
        if: always()
        run: |
          MB="${{ steps.rss.outputs.rss_mb }}"
          {
            echo "### Idle-RSS gate"
            echo "Daemon idle VmRSS: **${MB} MB** (limit: 30 MB, NFR-1, Linux only)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Tarball-build sentinel check (WEG-18) ────────────────────────────────────
  # Simulates `cargo install dreamd` from a crates.io tarball (no `.git/`).
  # vergen-gitcl with default `fail_on_error=false` emits `VERGEN_IDEMPOTENT_OUTPUT`
  # as the value for unresolvable instructions; `or_unknown` in commands::version
  # must convert that to "unknown". This job catches the regression where the
  # sentinel leaks into the shipped binary.
  tarball-sentinel:
    name: Tarball build (no .git) sentinel check
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tarball-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-tarball-

      - name: Rename .git/ to simulate tarball build
        run: mv .git .git.disabled

      - name: Build release without .git/
        run: cargo build --release --workspace

      - name: Assert no VERGEN_ sentinel in binary output
        run: |
          BINARY=target/release/dreamd
          SHORT=$("$BINARY" --version)
          LONG=$("$BINARY" version)
          echo "--version: $SHORT"
          echo "version:"
          echo "$LONG"
          if echo "$SHORT$LONG" | grep -q "VERGEN_"; then
            echo "::error::vergen sentinel leaked into binary output"
            exit 1
          fi
          if ! echo "$SHORT" | grep -q "unknown"; then
            echo "::error::expected 'unknown' in --version output when .git is absent"
            exit 1
          fi

  # ── DCO sign-off check ────────────────────────────────────────────────────────
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off on all commits
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          MISSING=()
          while IFS= read -r sha; do
            MSG=$(git log -1 --format="%B" "$sha")
            if ! echo "$MSG" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
              MISSING+=("$sha")
            fi
          done < <(git rev-list "$BASE".."$HEAD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::The following commits are missing a Signed-off-by trailer (DCO):"
            for sha in "${MISSING[@]}"; do
              echo "  - $sha: $(git log -1 --format='%s' "$sha")"
            done
            echo "Re-sign with: git rebase --signoff HEAD~${#MISSING[@]} && git push --force-with-lease"
            exit 1
          fi
          echo "All commits are signed off."

  # ── Binary size reporting — macOS (informational, DR-809) ────────────────────
  size-report-macos:
    name: Binary size (macOS, informational)
    runs-on: macos-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build and report binary size
        run: |
          cargo build --release
          BINARY=target/release/dreamd
          strip "$BINARY"
          SIZE_BYTES=$(stat -f%z "$BINARY")
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "macOS stripped binary: ${SIZE_MB} MB (${SIZE_BYTES} bytes)"
          echo "### macOS binary size: ${SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"

  # ── Binary size reporting — Windows (informational, DR-809) ──────────────────
  size-report-windows:
    name: Binary size (Windows, informational)
    runs-on: windows-latest
    needs: lint
    continue-on-error: true          # Windows daemon deferred (DR-121); informational only
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build and report binary size
        shell: pwsh
        run: |
          cargo build --release
          $binary = "target\release\dreamd.exe"
          $sizeBytes = (Get-Item $binary).Length
          $sizeMB = [math]::Round($sizeBytes / 1MB, 2)
          Write-Output "Windows binary (unstripped): $sizeMB MB ($sizeBytes bytes)"
          Add-Content $env:GITHUB_STEP_SUMMARY "### Windows binary size: $sizeMB MB (unstripped)"

  # ── Test coverage (report-only, no gate) ─────────────────────────────────────
  # cargo-llvm-cov over the workspace; uploads the HTML + lcov report as a build
  # artifact and writes the per-file summary to the job summary. Report-only:
  # never fails the build. Soft warnings fire below the 90% target and the 85%
  # floor. Reuses scripts/coverage.sh so local and CI measure the same surface
  # (same tests/bin/ ignore regex). To promote the 85% floor to a blocking gate,
  # uncomment the `exit 1` in the "Summarize + threshold warnings" step.
  coverage:
    name: Test coverage (report-only)
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-coverage-

      - name: Generate coverage report (html + lcov)
        run: scripts/coverage.sh

      - name: Summarize + threshold warnings
        run: |
          IGNORE_RE='tests/bin/'
          SUMMARY=$(cargo llvm-cov report --summary-only --ignore-filename-regex "$IGNORE_RE")
          LINE_COV=$(cargo llvm-cov report --json --summary-only --ignore-filename-regex "$IGNORE_RE" | jq '.data[0].totals.lines.percent')
          PRETTY=$(printf '%.2f' "$LINE_COV")
          echo "Total line coverage: ${PRETTY}%"
          {
            echo "### Test coverage — ${PRETTY}% lines"
            echo ''
            echo '```'
            echo "$SUMMARY"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          WARN_FLOOR=90.0
          HARD_FLOOR=85.0
          below_warn=$(awk -v c="$LINE_COV" -v w="$WARN_FLOOR" 'BEGIN { print (c + 0 < w + 0) ? 1 : 0 }')
          below_hard=$(awk -v c="$LINE_COV" -v h="$HARD_FLOOR" 'BEGIN { print (c + 0 < h + 0) ? 1 : 0 }')
          if [ "$below_hard" -eq 1 ]; then
            echo "::warning::Coverage ${PRETTY}% is below the 85% floor — report-only, not failing the build."
            # exit 1   # ← uncomment to promote the 85% floor to a blocking gate
          elif [ "$below_warn" -eq 1 ]; then
            echo "::warning::Coverage ${PRETTY}% is below the 90% soft target."
          fi

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            target/coverage/html
            target/coverage/lcov.info
          retention-days: 14

  # ── Alpha suite — cross-harness recall smoke test (WEG-423) ──────────────────
  # End-to-end proof of the demo claim "what one agent learns, the next already
  # knows": drives the real MCP stdio protocol (sandboxed HOME, real daemon) so a
  # learning appended as one harness is recalled by an independent process — on
  # both the daemon path (Phase 2) and the JSONL-replay path (Phase 1). Guards the
  # live append->index->read wiring that unit tests do NOT cover (WEG-264 was a
  # silent regression exactly there). Non-gating until it proves out (AC #4).
  alpha:
    name: Alpha suite (cross-harness recall)
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build dreamd CLI (debug binary)
        run: cargo build -p dreamd

      - name: Run alpha suite (cross-harness append->recall)
        # Suite polls ~10s for the socket + up to ~18s for the index commit;
        # 180s gives generous headroom. Exit code is authoritative (0 iff zero
        # failures); the suite prints "=== RESULT: N passed, N failed ===".
        run: timeout 180 bash scripts/alpha/alpha-suite.sh

  # ── Notify on main CI failure (WEG-257 / DR-102G) ────────────────────────────
  notify-failure:
    name: Notify on main CI failure
    needs: [lint, test, size-gate, tarball-sentinel, idle-rss-gate, audit, deny]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Post failure to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🔴 dreamd CI failed on main — ${GITHUB_SHA::8} — ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}" \
            "$SLACK_WEBHOOK_URL"
